<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Battle Arena – 10 Levels</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600;700;800&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',sans-serif;background:#0a0a1a;min-height:100vh;display:flex;justify-content:center;align-items:center;color:#e0e0e0;overflow-x:hidden}

  #game-wrapper{display:flex;gap:16px;max-width:1120px;width:96vw;align-items:flex-start}

  /* ===== HERO SIDE PANEL ===== */
  .hero-panel{width:200px;min-width:180px;background:linear-gradient(160deg,#1a1a2e,#0f1a30);border-radius:18px;padding:18px 14px;border:1px solid rgba(79,172,254,.15);box-shadow:0 0 30px rgba(79,172,254,.08);position:sticky;top:20px;flex-shrink:0}
  .hp-header{font-family:'Press Start 2P',monospace;font-size:9px;text-align:center;color:#4facfe;margin-bottom:14px;letter-spacing:1px}
  .hp-sprite-wrap{text-align:center;margin-bottom:12px}
  .hp-sprite-wrap .sprite{font-size:48px;display:inline-block;filter:drop-shadow(0 0 12px rgba(79,172,254,.4));animation:heroIdle 3s ease-in-out infinite}
  @keyframes heroIdle{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
  .hp-name{text-align:center;font-weight:700;font-size:14px;color:#4facfe;margin-bottom:2px}
  .hp-title{text-align:center;font-size:10px;color:#888;margin-bottom:14px}
  .hp-divider{height:1px;background:linear-gradient(90deg,transparent,rgba(79,172,254,.25),transparent);margin:10px 0}
  .hp-stat{display:flex;justify-content:space-between;align-items:center;font-size:11px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.04)}
  .hp-stat:last-child{border-bottom:none}
  .hp-stat .stat-icon{flex-shrink:0;width:20px}
  .hp-stat .stat-name{color:#999;flex:1}
  .hp-stat .stat-val{font-weight:700;color:#e0e0e0;text-align:right}
  .hp-upgrades{margin-top:10px}
  .hp-upgrades-title{font-size:9px;color:#666;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
  .hp-upgrade-tag{display:inline-block;font-size:8px;padding:2px 6px;border-radius:4px;margin:2px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:#bbb}
  .hp-upgrade-tag.common{border-color:rgba(67,233,123,.3);color:#43e97b}
  .hp-upgrade-tag.rare{border-color:rgba(79,172,254,.3);color:#4facfe}
  .hp-upgrade-tag.epic{border-color:rgba(192,132,252,.3);color:#c084fc}
  .hp-upgrade-tag.legendary{border-color:rgba(255,210,0,.3);color:#ffd200}

  /* ===== MAIN GAME ===== */
  #game-container{flex:1;background:linear-gradient(145deg,#1a1a2e,#16213e);border-radius:20px;padding:24px;box-shadow:0 0 40px rgba(100,100,255,.12);border:1px solid rgba(255,255,255,.08);position:relative;overflow:hidden}

  h1{font-family:'Press Start 2P',monospace;text-align:center;font-size:15px;background:linear-gradient(90deg,#f7971e,#ffd200);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}

  .sub-header{text-align:center;font-size:12px;color:#aaa;margin-bottom:12px;display:flex;justify-content:center;gap:20px;flex-wrap:wrap}
  .sub-header span{color:#ffd200;font-weight:700}
  .town-name{font-weight:700;color:#c084fc}

  .level-progress{display:flex;justify-content:center;gap:4px;margin-bottom:14px;flex-wrap:wrap}
  .lp-dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;border:2px solid rgba(255,255,255,.12);color:#555;background:rgba(255,255,255,.03);transition:all .4s}
  .lp-dot.cleared{background:linear-gradient(135deg,#43e97b,#38f9d7);color:#1a1a2e;border-color:#43e97b;box-shadow:0 0 8px rgba(67,233,123,.3)}
  .lp-dot.current{background:linear-gradient(135deg,#ffd200,#f7971e);color:#1a1a2e;border-color:#ffd200;box-shadow:0 0 14px rgba(255,210,0,.5);animation:currentPulse 2s ease-in-out infinite}
  @keyframes currentPulse{0%,100%{box-shadow:0 0 8px rgba(255,210,0,.3)}50%{box-shadow:0 0 20px rgba(255,210,0,.6)}}

  .arena{display:flex;justify-content:space-between;align-items:stretch;gap:14px;margin-bottom:16px;min-height:220px}

  .fighter-card{flex:1;background:rgba(255,255,255,.03);border-radius:16px;padding:18px;text-align:center;border:1px solid rgba(255,255,255,.06);position:relative;transition:all .3s;overflow:hidden}
  .fighter-card::before{content:'';position:absolute;inset:0;border-radius:16px;opacity:0;transition:opacity .4s}
  .fighter-card.hero{border-top:3px solid #4facfe}
  .fighter-card.hero::before{background:radial-gradient(circle at 50% 80%,rgba(79,172,254,.08),transparent 70%)}
  .fighter-card.enemy{border-top:3px solid #f5576c}
  .fighter-card.enemy::before{background:radial-gradient(circle at 50% 80%,rgba(245,87,108,.08),transparent 70%)}

  /* HIT animations */
  .fighter-card.hit{animation:shakeHit .5s ease}
  .fighter-card.hit::before{opacity:1}
  @keyframes shakeHit{0%,100%{transform:translateX(0)}15%{transform:translateX(-10px) rotate(-1deg)}30%{transform:translateX(10px) rotate(1deg)}45%{transform:translateX(-6px)}60%{transform:translateX(6px)}75%{transform:translateX(-3px)}90%{transform:translateX(3px)}}

  /* ATTACK animations */
  .fighter-card.attacking-melee .fighter-sprite{animation:meleeSwing .5s ease}
  @keyframes meleeSwing{0%{transform:scale(1) rotate(0)}25%{transform:scale(1.2) rotate(-15deg) translateX(20px)}50%{transform:scale(1.35) rotate(10deg) translateX(30px)}75%{transform:scale(1.1) rotate(-5deg)}100%{transform:scale(1) rotate(0)}}

  .fighter-card.attacking-fire .fighter-sprite{animation:fireBlast .6s ease}
  @keyframes fireBlast{0%{transform:scale(1);filter:brightness(1)}30%{transform:scale(1.3);filter:brightness(1.8) hue-rotate(-20deg)}60%{transform:scale(1.15);filter:brightness(1.4) hue-rotate(10deg)}100%{transform:scale(1);filter:brightness(1)}}

  .fighter-card.attacking-ice .fighter-sprite{animation:iceShot .55s ease}
  @keyframes iceShot{0%{transform:scale(1) rotate(0);filter:brightness(1)}35%{transform:scale(1.2) rotate(5deg);filter:brightness(1.6) hue-rotate(180deg)}70%{transform:scale(1.1) rotate(-3deg);filter:brightness(1.3) hue-rotate(90deg)}100%{transform:scale(1);filter:brightness(1) hue-rotate(0)}}

  .fighter-card.attacking-heal .fighter-sprite{animation:healGlow .7s ease}
  @keyframes healGlow{0%{transform:scale(1);filter:brightness(1) drop-shadow(0 0 0 transparent)}50%{transform:scale(1.15);filter:brightness(1.5) drop-shadow(0 0 20px rgba(67,233,123,.8))}100%{transform:scale(1);filter:brightness(1) drop-shadow(0 0 0 transparent)}}

  .fighter-card.attacking-enemy .fighter-sprite{animation:enemyAttack .5s ease}
  @keyframes enemyAttack{0%{transform:scale(1) translateX(0)}30%{transform:scale(1.25) translateX(-25px)}60%{transform:scale(1.1) translateX(-10px)}100%{transform:scale(1) translateX(0)}}

  /* hit flash overlay */
  .hit-flash{position:absolute;inset:0;border-radius:16px;pointer-events:none;opacity:0;z-index:10}
  .fighter-card.hit .hit-flash{animation:flashBang .4s ease}
  @keyframes flashBang{0%{opacity:0}20%{opacity:.5}100%{opacity:0}}
  .hero .hit-flash{background:radial-gradient(circle,rgba(245,87,108,.6),transparent 70%)}
  .enemy .hit-flash{background:radial-gradient(circle,rgba(245,87,108,.6),transparent 70%)}

  /* heal flash */
  .heal-flash{position:absolute;inset:0;border-radius:16px;pointer-events:none;opacity:0;z-index:10}
  .fighter-card.healing .heal-flash{animation:healFlash .6s ease}
  @keyframes healFlash{0%{opacity:0}30%{opacity:.4}100%{opacity:0}}
  .heal-flash{background:radial-gradient(circle,rgba(67,233,123,.5),transparent 70%)}

  .fighter-sprite{font-size:52px;margin-bottom:8px;display:inline-block;position:relative;z-index:2;transition:filter .3s}
  .fighter-name{font-weight:700;font-size:15px;margin-bottom:3px;position:relative;z-index:2}
  .hero .fighter-name{color:#4facfe}
  .enemy .fighter-name{color:#f5576c}
  .fighter-title{font-size:10px;color:#888;margin-bottom:10px;position:relative;z-index:2}

  .stat-bar{margin-bottom:6px;text-align:left;position:relative;z-index:2}
  .stat-label{font-size:10px;font-weight:600;display:flex;justify-content:space-between;margin-bottom:2px}
  .bar-track{height:14px;background:rgba(0,0,0,.5);border-radius:7px;overflow:hidden;box-shadow:inset 0 2px 4px rgba(0,0,0,.3)}
  .bar-fill{height:100%;border-radius:7px;transition:width .6s ease;position:relative}
  .bar-fill::after{content:'';position:absolute;top:1px;left:4px;right:4px;height:4px;border-radius:3px;background:rgba(255,255,255,.2)}
  .hp-fill{background:linear-gradient(90deg,#43e97b,#38f9d7)}
  .hp-fill.low{background:linear-gradient(90deg,#f5576c,#ff6a88);animation:hpPulse 1s ease infinite}
  @keyframes hpPulse{0%,100%{opacity:1}50%{opacity:.7}}
  .mp-fill{background:linear-gradient(90deg,#4facfe,#00f2fe)}

  .vs-badge{align-self:center;font-family:'Press Start 2P',monospace;font-size:22px;color:#ffd200;text-shadow:0 0 25px rgba(255,210,0,.5);flex-shrink:0;animation:vsPulse 2s ease-in-out infinite}
  @keyframes vsPulse{0%,100%{transform:scale(1);text-shadow:0 0 15px rgba(255,210,0,.3)}50%{transform:scale(1.1);text-shadow:0 0 30px rgba(255,210,0,.6)}}

  .actions{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
  .action-btn{padding:12px 6px;border:none;border-radius:12px;font-family:'Inter',sans-serif;font-weight:600;font-size:12px;cursor:pointer;transition:all .25s ease;color:#fff;position:relative;overflow:hidden}
  .action-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.12),transparent);border-radius:12px}
  .action-btn:disabled{opacity:.3;cursor:not-allowed;transform:none!important}
  .action-btn:not(:disabled):hover{transform:translateY(-4px) scale(1.03);box-shadow:0 8px 25px rgba(0,0,0,.4)}
  .action-btn:not(:disabled):active{transform:translateY(-1px) scale(.98)}
  .action-btn .mp-cost{display:block;font-size:9px;opacity:.7;margin-top:2px}
  .btn-attack{background:linear-gradient(135deg,#667eea,#764ba2)}
  .btn-fireball{background:linear-gradient(135deg,#f7971e,#f5576c)}
  .btn-ice{background:linear-gradient(135deg,#4facfe,#00f2fe)}
  .btn-heal{background:linear-gradient(135deg,#43e97b,#38f9d7);color:#1a1a2e}

  .log-box{background:rgba(0,0,0,.35);border-radius:12px;padding:12px;max-height:130px;overflow-y:auto;font-size:12px;line-height:1.7;border:1px solid rgba(255,255,255,.05)}
  .log-box::-webkit-scrollbar{width:4px}
  .log-box::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:4px}
  .log-entry{padding:2px 0;animation:logSlide .3s ease}
  @keyframes logSlide{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
  .log-hero{color:#4facfe}.log-enemy{color:#f5576c}.log-system{color:#ffd200;font-weight:600}.log-heal{color:#43e97b}

  /* OVERLAYS */
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);justify-content:center;align-items:center;z-index:100;backdrop-filter:blur(8px)}
  .overlay.show{display:flex}
  .overlay-box{background:linear-gradient(145deg,#1a1a2e,#16213e);border-radius:20px;padding:36px;text-align:center;border:1px solid rgba(255,255,255,.1);box-shadow:0 0 80px rgba(100,100,255,.2);max-width:540px;width:92%;animation:overlayPop .4s ease}
  @keyframes overlayPop{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
  .overlay-box h2{font-family:'Press Start 2P',monospace;font-size:16px;margin-bottom:10px}
  .overlay-box p{font-size:14px;color:#aaa;margin-bottom:20px;white-space:pre-line}
  .overlay-btn{padding:12px 32px;border:none;border-radius:12px;font-family:'Inter',sans-serif;font-weight:700;font-size:14px;cursor:pointer;color:#fff;background:linear-gradient(135deg,#667eea,#764ba2);transition:transform .2s,box-shadow .2s;margin:4px;position:relative;overflow:hidden}
  .overlay-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.15),transparent);border-radius:12px}
  .overlay-btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
  .win-text{color:#43e97b}.lose-text{color:#f5576c}

  /* UPGRADE CARDS */
  .upgrade-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:16px}
  .upgrade-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:18px 14px;cursor:pointer;transition:all .3s;text-align:center;position:relative;overflow:hidden}
  .upgrade-card::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .3s}
  .upgrade-card:hover{transform:translateY(-6px);box-shadow:0 12px 35px rgba(100,100,255,.25);border-color:rgba(255,255,255,.25)}
  .upgrade-card:hover::before{opacity:1}
  .upgrade-card.rarity-common{border-left:3px solid #43e97b}
  .upgrade-card.rarity-common::before{background:radial-gradient(circle at 50% 100%,rgba(67,233,123,.1),transparent 60%)}
  .upgrade-card.rarity-rare{border-left:3px solid #4facfe}
  .upgrade-card.rarity-rare::before{background:radial-gradient(circle at 50% 100%,rgba(79,172,254,.1),transparent 60%)}
  .upgrade-card.rarity-epic{border-left:3px solid #c084fc}
  .upgrade-card.rarity-epic::before{background:radial-gradient(circle at 50% 100%,rgba(192,132,252,.12),transparent 60%)}
  .upgrade-card.rarity-legendary{border-left:3px solid #ffd200;animation:legendaryGlow 2s ease-in-out infinite}
  .upgrade-card.rarity-legendary::before{background:radial-gradient(circle at 50% 100%,rgba(255,210,0,.1),transparent 60%)}
  @keyframes legendaryGlow{0%,100%{box-shadow:0 0 8px rgba(255,210,0,.1)}50%{box-shadow:0 0 20px rgba(255,210,0,.25)}}
  .uc-icon{font-size:34px;margin-bottom:8px}
  .uc-name{font-weight:700;font-size:13px;margin-bottom:4px;color:#ffd200}
  .uc-desc{font-size:11px;color:#bbb;line-height:1.5}
  .uc-rarity{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
  .uc-rarity.common{color:#43e97b}.uc-rarity.rare{color:#4facfe}.uc-rarity.epic{color:#c084fc}.uc-rarity.legendary{color:#ffd200}

  /* PARTICLES */
  .particle-container{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:20;border-radius:16px}
  .particle{position:absolute;border-radius:50%;pointer-events:none;animation:particleFly .8s ease-out forwards}
  @keyframes particleFly{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--px),var(--py)) scale(0)}}

  /* DAMAGE POPUP */
  .dmg-popup{position:absolute;font-weight:800;font-size:22px;pointer-events:none;z-index:50;text-shadow:0 2px 8px rgba(0,0,0,.6)}
  .dmg-popup.dmg-anim{animation:dmgFloat 1.2s ease forwards}
  @keyframes dmgFloat{0%{opacity:1;transform:translateY(0) scale(.5)}15%{transform:translateY(-10px) scale(1.3)}30%{transform:translateY(-20px) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(.8)}}

  /* Screen shake on big hit */
  .screen-shake{animation:screenShake .3s ease}
  @keyframes screenShake{0%,100%{transform:translate(0)}25%{transform:translate(-3px,2px)}50%{transform:translate(3px,-2px)}75%{transform:translate(-2px,1px)}}

  /* Responsive */
  @media(max-width:800px){
    #game-wrapper{flex-direction:column;align-items:stretch}
    .hero-panel{width:100%;position:static;display:flex;flex-wrap:wrap;gap:8px;padding:14px}
    .hp-header{width:100%}
    .hp-sprite-wrap{display:none}
    .hp-name,.hp-title,.hp-divider{display:none}
    .hp-stat{flex:1;min-width:80px;border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:6px 8px}
    .hp-upgrades{width:100%}
  }
</style>
</head>
<body>
<div id="game-wrapper">
  <!-- HERO SIDE PANEL -->
  <div class="hero-panel" id="hero-panel">
    <div class="hp-header">⚔ HERO STATUS</div>
    <div class="hp-sprite-wrap"><div class="sprite">🧙‍♂️</div></div>
    <div class="hp-name">Hero</div>
    <div class="hp-title">Wandering Mage</div>
    <div class="hp-divider"></div>
    <div id="panel-stats"></div>
    <div class="hp-divider"></div>
    <div class="hp-upgrades" id="panel-upgrades">
      <div class="hp-upgrades-title">Upgrades</div>
      <div id="panel-upgrade-tags"><span style="font-size:10px;color:#555">None yet</span></div>
    </div>
  </div>

  <!-- MAIN GAME -->
  <div id="game-container">
    <h1>⚔️ BATTLE ARENA ⚔️</h1>
    <div class="sub-header">
      <div>Level <span id="level-num">1</span>/10 — <span class="town-name" id="town-name">Peaceful Village</span></div>
    </div>
    <div class="level-progress" id="level-progress"></div>
    <div class="arena">
      <div class="fighter-card hero" id="hero-card">
        <div class="particle-container" id="hero-particles"></div>
        <div class="hit-flash"></div>
        <div class="heal-flash"></div>
        <div class="fighter-sprite" id="hero-sprite">🧙‍♂️</div>
        <div class="fighter-name">Hero</div>
        <div class="fighter-title" id="hero-title">Wandering Mage</div>
        <div class="stat-bar"><div class="stat-label"><span>HP</span><span id="hero-hp-text"></span></div><div class="bar-track"><div class="bar-fill hp-fill" id="hero-hp-bar" style="width:100%"></div></div></div>
        <div class="stat-bar"><div class="stat-label"><span>MP</span><span id="hero-mp-text"></span></div><div class="bar-track"><div class="bar-fill mp-fill" id="hero-mp-bar" style="width:100%"></div></div></div>
      </div>
      <div class="vs-badge">VS</div>
      <div class="fighter-card enemy" id="enemy-card">
        <div class="particle-container" id="enemy-particles"></div>
        <div class="hit-flash"></div>
        <div class="heal-flash"></div>
        <div class="fighter-sprite" id="enemy-sprite">🐗</div>
        <div class="fighter-name" id="enemy-name">Boar</div>
        <div class="fighter-title" id="enemy-title">Wild Beast</div>
        <div class="stat-bar"><div class="stat-label"><span>HP</span><span id="enemy-hp-text"></span></div><div class="bar-track"><div class="bar-fill hp-fill" id="enemy-hp-bar" style="width:100%"></div></div></div>
        <div class="stat-bar"><div class="stat-label"><span>MP</span><span id="enemy-mp-text"></span></div><div class="bar-track"><div class="bar-fill mp-fill" id="enemy-mp-bar" style="width:100%"></div></div></div>
      </div>
    </div>
    <div class="actions" id="actions">
      <button class="action-btn btn-attack" onclick="playerAction('attack')">⚔️ Attack<span class="mp-cost">0 MP</span></button>
      <button class="action-btn btn-fireball" onclick="playerAction('fireball')">🔥 Fireball<span class="mp-cost">15 MP</span></button>
      <button class="action-btn btn-ice" onclick="playerAction('ice')">❄️ Ice Shard<span class="mp-cost">10 MP</span></button>
      <button class="action-btn btn-heal" onclick="playerAction('heal')">💚 Heal<span class="mp-cost">12 MP</span></button>
    </div>
    <div class="log-box" id="log-box"></div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="overlay-box" id="overlay-box">
    <h2 id="overlay-title"></h2>
    <p id="overlay-msg"></p>
    <div id="overlay-extra"></div>
    <div id="overlay-buttons"></div>
  </div>
</div>

<script>
/* ===== ENEMIES ===== */
const ENEMIES=[
  {name:'Boar',sprite:'🐗',title:'Wild Beast',hp:70,mp:10,skills:[{name:'Charge',mp:0,min:5,max:10,type:'d',emoji:'🐗'},{name:'Tusk Stab',mp:5,min:8,max:14,type:'d',emoji:'🦷'},{name:'Graze',mp:5,min:6,max:10,type:'h',emoji:'🌿'}],town:'Peaceful Village'},
  {name:'Goblin',sprite:'👺',title:'Sneaky Thief',hp:90,mp:20,skills:[{name:'Dagger Slash',mp:0,min:6,max:12,type:'d',emoji:'🗡️'},{name:'Poison Dart',mp:8,min:10,max:18,type:'d',emoji:'☠️'},{name:'Smoke Bomb',mp:6,min:8,max:14,type:'d',emoji:'💨'},{name:'Bandage',mp:6,min:8,max:14,type:'h',emoji:'🩹'}],town:'Goblin Outpost'},
  {name:'Skeleton',sprite:'💀',title:'Undead Warrior',hp:100,mp:25,skills:[{name:'Bone Strike',mp:0,min:7,max:13,type:'d',emoji:'🦴'},{name:'Dark Slash',mp:10,min:14,max:22,type:'d',emoji:'⚫'},{name:'Soul Drain',mp:8,min:10,max:16,type:'d',emoji:'👻'},{name:'Reassemble',mp:7,min:10,max:18,type:'h',emoji:'🔩'}],town:'Forgotten Graveyard'},

/* ===== HERO ===== */
let H={};
function newHero(){
  return{baseMaxHp:100,baseMaxMp:50,atkBonus:0,fireBonus:0,fireCostReduce:0,iceBonus:0,iceCostReduce:0,
    healBonus:0,healCostReduce:0,mpRegen:0,thorns:0,critChance:0.05,dodgeChance:0,lifesteal:0,armor:0,
    berserker:false,hasSecondWind:false,secondWindUsed:false,upgrades:[],upgradeRarities:[]};
}
function heroMaxHp(){return H.baseMaxHp}
function heroMaxMp(){return H.baseMaxMp}
function getHeroSkills(){
  const fc=Math.max(1,15-H.fireCostReduce),ic=Math.max(1,10-H.iceCostReduce),hc=Math.max(1,12-H.healCostReduce);
  return{
    attack:{name:'Attack',mp:0,min:8+H.atkBonus,max:15+H.atkBonus,type:'d',emoji:'⚔️',anim:'melee'},
    fireball:{name:'Fireball',mp:fc,min:22+H.fireBonus,max:35+H.fireBonus,type:'d',emoji:'🔥',anim:'fire'},
    ice:{name:'Ice Shard',mp:ic,min:14+H.iceBonus,max:24+H.iceBonus,type:'d',emoji:'❄️',anim:'ice'},
    heal:{name:'Heal',mp:hc,min:18+H.healBonus,max:30+H.healBonus,type:'h',emoji:'💚',anim:'heal'},
  };
}

/* ===== STATE ===== */
let level=1,busy=false,hero={},enemy={},curEnemy={};
function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a}

/* ===== INIT ===== */
function initFullGame(){H=newHero();level=1;initLevel();}

function initLevel(){
  curEnemy=ENEMIES[level-1];
  hero={hp:heroMaxHp(),mp:heroMaxMp(),maxHp:heroMaxHp(),maxMp:heroMaxMp()};
  enemy={hp:curEnemy.hp,mp:curEnemy.mp,maxHp:curEnemy.hp,maxMp:curEnemy.mp};
  H.secondWindUsed=false;
  busy=false;
  document.getElementById('log-box').innerHTML='';
  document.getElementById('level-num').textContent=level;
  document.getElementById('town-name').textContent=curEnemy.town;
  document.getElementById('enemy-sprite').textContent=curEnemy.sprite;
  document.getElementById('enemy-name').textContent=curEnemy.name;
  document.getElementById('enemy-title').textContent=curEnemy.title;
  renderLevelProgress();
  renderPanel();
  updateUI();
  addLog(`⚔️ Level ${level} — <b>${curEnemy.name}</b> appears at <b>${curEnemy.town}</b>!`,'system');
  setButtons(true);
}

/* ===== SIDE PANEL ===== */
function renderPanel(){
  const sk=getHeroSkills();
  const stats=[
    {icon:'❤️',name:'Max HP',val:heroMaxHp()},
    {icon:'💧',name:'Max MP',val:heroMaxMp()},
    {icon:'⚔️',name:'Attack',val:`${sk.attack.min}–${sk.attack.max}`},
    {icon:'🔥',name:'Fireball',val:`${sk.fireball.min}–${sk.fireball.max}`},
    {icon:'❄️',name:'Ice Shard',val:`${sk.ice.min}–${sk.ice.max}`},
    {icon:'💚',name:'Heal',val:`${sk.heal.min}–${sk.heal.max}`},
  ];
  if(H.armor)stats.push({icon:'🛡️',name:'Armor',val:H.armor});
  if(H.thorns)stats.push({icon:'🌹',name:'Thorns',val:H.thorns});
  if(H.critChance>0.06)stats.push({icon:'💥',name:'Crit',val:Math.round(H.critChance*100)+'%'});
  if(H.dodgeChance)stats.push({icon:'💨',name:'Dodge',val:Math.round(H.dodgeChance*100)+'%'});
  if(H.lifesteal)stats.push({icon:'🧛',name:'Life Steal',val:Math.round(H.lifesteal*100)+'%'});
  if(H.mpRegen)stats.push({icon:'🔋',name:'MP Regen',val:'+'+H.mpRegen});
  if(H.berserker)stats.push({icon:'🔴',name:'Berserker',val:'Active'});
  if(H.hasSecondWind)stats.push({icon:'🌬️',name:'2nd Wind',val:'Ready'});

  document.getElementById('panel-stats').innerHTML=stats.map(s=>`<div class="hp-stat"><span class="stat-icon">${s.icon}</span><span class="stat-name">${s.name}</span><span class="stat-val">${s.val}</span></div>`).join('');

  const tags=document.getElementById('panel-upgrade-tags');
  if(H.upgrades.length===0){
    tags.innerHTML='<span style="font-size:10px;color:#555">None yet</span>';
  }else{
    tags.innerHTML=H.upgrades.map((u,i)=>`<span class="hp-upgrade-tag ${H.upgradeRarities[i]||''}">${u}</span>`).join('');
  }
}

/* ===== LEVEL DOTS ===== */
function renderLevelProgress(){
  const c=document.getElementById('level-progress');c.innerHTML='';
  for(let i=1;i<=10;i++){
    const d=document.createElement('div');
    d.className='lp-dot'+(i<level?' cleared':'')+(i===level?' current':'');
    d.textContent=i;c.appendChild(d);
  }
}

/* ===== BARS ===== */
function updateUI(){
  const sk=getHeroSkills();
  const set=(pre,obj)=>{
    const hp=obj.hp,mhp=obj.maxHp,mp=obj.mp,mmp=obj.maxMp;
    document.getElementById(pre+'-hp-bar').style.width=(hp/mhp*100)+'%';
    document.getElementById(pre+'-hp-bar').className='bar-fill hp-fill'+((hp/mhp)<0.3?' low':'');
    document.getElementById(pre+'-mp-bar').style.width=(mp/mmp*100)+'%';
    document.getElementById(pre+'-hp-text').textContent=hp+' / '+mhp;
    document.getElementById(pre+'-mp-text').textContent=mp+' / '+mmp;
  };
  set('hero',hero);set('enemy',enemy);
  const btns=document.querySelectorAll('.action-btn');
  btns[0].querySelector('.mp-cost').textContent=sk.attack.mp+' MP';
  btns[1].querySelector('.mp-cost').textContent=sk.fireball.mp+' MP';
  btns[1].disabled=hero.mp<sk.fireball.mp;
  btns[2].querySelector('.mp-cost').textContent=sk.ice.mp+' MP';
  btns[2].disabled=hero.mp<sk.ice.mp;
  btns[3].querySelector('.mp-cost').textContent=sk.heal.mp+' MP';
  btns[3].disabled=hero.mp<sk.heal.mp;
}

function setButtons(on){document.querySelectorAll('.action-btn').forEach(b=>{b.style.pointerEvents=on?'':'none'});}
function addLog(m,t){const b=document.getElementById('log-box'),d=document.createElement('div');d.className='log-entry log-'+(t||'');d.innerHTML=m;b.appendChild(d);b.scrollTop=b.scrollHeight;}

/* ===== PARTICLES ===== */
function spawnParticles(containerId,color,count){
  const c=document.getElementById(containerId);
  for(let i=0;i<count;i++){
    const p=document.createElement('div');p.className='particle';
    const sz=rand(4,10);
    p.style.cssText=`width:${sz}px;height:${sz}px;background:${color};left:${rand(20,80)}%;top:${rand(20,70)}%;--px:${rand(-50,50)}px;--py:${rand(-60,-20)}px;animation-delay:${i*50}ms`;
    c.appendChild(p);setTimeout(()=>p.remove(),900);
  }
}

/* ===== POPUP ===== */
function showPopup(el,text,color){
  const p=document.createElement('div');p.className='dmg-popup dmg-anim';p.textContent=text;p.style.color=color;
  p.style.left='50%';p.style.top='20%';p.style.transform='translateX(-50%)';
  el.appendChild(p);setTimeout(()=>p.remove(),1300);
}

/* ===== ANIMATIONS ===== */
function playAttackAnim(card,type){
  const cls='attacking-'+type;card.classList.add(cls);
  setTimeout(()=>card.classList.remove(cls),700);
}
function playHitAnim(card){
  card.classList.add('hit');setTimeout(()=>card.classList.remove('hit'),550);
}
function playHealAnim(card){
  card.classList.add('healing');setTimeout(()=>card.classList.remove('healing'),650);
}

/* ===== COMBAT ===== */
function calcDamage(min,max,isHero){
  let dmg=rand(min,max);
  if(isHero&&H.berserker&&hero.hp/hero.maxHp<0.3)dmg=Math.round(dmg*1.5);
  let crit=false;const cc=isHero?H.critChance:0.05;
  if(Math.random()<cc){dmg=Math.round(dmg*1.8);crit=true;}
  return{dmg,crit};
}

function applyDmgToHero(rawDmg){
  if(H.dodgeChance&&Math.random()<H.dodgeChance){
    addLog(`💨 Hero <b>dodges</b> the attack!`,'hero');
    showPopup(document.getElementById('hero-card'),'DODGE!','#ffd200');return 0;
  }
  let dmg=Math.max(1,rawDmg-H.armor);
  hero.hp=Math.max(0,hero.hp-dmg);
  if(hero.hp<=0&&H.hasSecondWind&&!H.secondWindUsed){
    H.secondWindUsed=true;hero.hp=1;
    addLog(`🌬️ <b>Second Wind!</b> Hero clings to life with 1 HP!`,'system');
    spawnParticles('hero-particles','#ffd200',12);
  }
  if(H.thorns&&enemy.hp>0){
    enemy.hp=Math.max(0,enemy.hp-H.thorns);
    addLog(`🌹 Thorns reflect <b>${H.thorns}</b> damage!`,'hero');
    spawnParticles('enemy-particles','#f5576c',5);
  }
  return dmg;
}

function playerAction(key){
  if(busy)return;
  const sk=getHeroSkills()[key];
  if(hero.mp<sk.mp){addLog('Not enough MP!','system');return;}
  busy=true;setButtons(false);
  hero.mp-=sk.mp;
  if(H.mpRegen)hero.mp=Math.min(hero.maxMp,hero.mp+H.mpRegen);

  const hc=document.getElementById('hero-card'),ec=document.getElementById('enemy-card');
  playAttackAnim(hc,sk.anim);

  if(sk.type==='d'){
    const{dmg,crit}=calcDamage(sk.min,sk.max,true);
    enemy.hp=Math.max(0,enemy.hp-dmg);
    const ct=crit?' <b style="color:#ffd200">💥 CRIT!</b>':'';
    addLog(`${sk.emoji} Hero uses <b>${sk.name}</b> → <b>${dmg}</b> damage!${ct}`,'hero');
    setTimeout(()=>{
      playHitAnim(ec);
      showPopup(ec,crit?`💥 ${dmg}`:`-${dmg}`,'#f5576c');
      spawnParticles('enemy-particles',sk.anim==='fire'?'#ff6b35':sk.anim==='ice'?'#00f2fe':'#c084fc',crit?14:8);
      if(crit)document.getElementById('game-container').classList.add('screen-shake'),setTimeout(()=>document.getElementById('game-container').classList.remove('screen-shake'),350);
    },250);
    if(H.lifesteal){const ls=Math.round(dmg*H.lifesteal);if(ls>0){hero.hp=Math.min(hero.maxHp,hero.hp+ls);addLog(`🧛 Life Steal heals <b>${ls}</b> HP!`,'heal');}}
  }else{
    const heal=rand(sk.min,sk.max);
    hero.hp=Math.min(hero.maxHp,hero.hp+heal);
    addLog(`${sk.emoji} Hero uses <b>${sk.name}</b> → heals <b>${heal}</b> HP!`,'heal');
    playHealAnim(hc);showPopup(hc,`+${heal}`,'#43e97b');
    spawnParticles('hero-particles','#43e97b',10);
  }

  setTimeout(()=>{
    updateUI();
    if(enemy.hp<=0){endBattle('hero');return;}
    setTimeout(()=>enemyTurn(),700);
  },550);
}

function enemyTurn(){
  const es=curEnemy.skills;
  let avail=es.filter(s=>enemy.mp>=s.mp);if(!avail.length)avail=[es[0]];
  let pick;const hpR=enemy.hp/enemy.maxHp;const healSk=avail.find(s=>s.type==='h');
  if(hpR<0.3&&healSk&&Math.random()<0.65)pick=healSk;
  else{const ds=avail.filter(s=>s.type==='d');pick=ds.length?ds[rand(0,ds.length-1)]:avail[0];}

  enemy.mp-=pick.mp;
  const hc=document.getElementById('hero-card'),ec=document.getElementById('enemy-card');
  playAttackAnim(ec,'enemy');

  if(pick.type==='d'){
    const{dmg,crit}=calcDamage(pick.min,pick.max,false);
    const actual=applyDmgToHero(dmg);
    if(actual>0){
      const ct=crit?' <b style="color:#ffd200">💥 CRIT!</b>':'';
      addLog(`${pick.emoji} ${curEnemy.name} uses <b>${pick.name}</b> → <b>${actual}</b> damage!${ct}`,'enemy');
      setTimeout(()=>{
        playHitAnim(hc);showPopup(hc,crit?`💥 ${actual}`:`-${actual}`,'#f5576c');
        spawnParticles('hero-particles','#f5576c',crit?14:8);
        if(crit)document.getElementById('game-container').classList.add('screen-shake'),setTimeout(()=>document.getElementById('game-container').classList.remove('screen-shake'),350);
      },250);
    }
  }else{
    const heal=rand(pick.min,pick.max);enemy.hp=Math.min(enemy.maxHp,enemy.hp+heal);
    addLog(`${pick.emoji} ${curEnemy.name} uses <b>${pick.name}</b> → heals <b>${heal}</b>!`,'heal');
    playHealAnim(ec);showPopup(ec,`+${heal}`,'#43e97b');
    spawnParticles('enemy-particles','#43e97b',8);
  }

  setTimeout(()=>{
    updateUI();
    if(hero.hp<=0){endBattle('enemy');return;}
    busy=false;setButtons(true);updateUI();
  },550);
}

/* ===== END BATTLE ===== */
let overlayNextAction=null;

function endBattle(winner){
  setButtons(false);
  if(winner==='hero'){
    addLog(`🎉 <b>${curEnemy.name} defeated!</b> ${curEnemy.town} is saved!`,'system');
    if(level>=10){
      setTimeout(()=>showSimple('🏆 CHAMPION!',`You conquered all 10 levels!\nThe realm is forever grateful!`,'win-text','Play Again','fullRestart'),900);
    }else{
      setTimeout(()=>showUpgrades(),900);
    }
  }else{
    addLog(`💀 <b>Hero falls at ${curEnemy.town}...</b>`,'system');
    setTimeout(()=>showSimple('💀 GAME OVER',`Defeated at Level ${level} — ${curEnemy.town}.\nAll upgrades have been lost.`,'lose-text','Restart from Level 1','fullRestart'),900);
  }
}

function showSimple(title,msg,cls,btnText,action){
  document.getElementById('overlay-title').textContent=title;
  document.getElementById('overlay-title').className=cls;
  document.getElementById('overlay-msg').textContent=msg;
  document.getElementById('overlay-extra').innerHTML='';
  document.getElementById('overlay-buttons').innerHTML=`<button class="overlay-btn" onclick="doOverlay()">${btnText}</button>`;
  overlayNextAction=action;
  document.getElementById('overlay').classList.add('show');
}

function showUpgrades(){
  const pool=[...UPGRADES];
  let filtered=pool;
  if(level<=3)filtered=pool.filter(u=>u.rarity!=='legendary');
  if(level<=1)filtered=filtered.filter(u=>u.rarity!=='epic');

  const chosen=[];const used=new Set();
  while(chosen.length<3&&filtered.length>used.size){
    const idx=rand(0,filtered.length-1);
    if(!used.has(idx)){used.add(idx);chosen.push(filtered[idx]);}
  }

  document.getElementById('overlay-title').textContent='⬆️ LEVEL CLEARED!';
  document.getElementById('overlay-title').className='win-text';
  document.getElementById('overlay-msg').textContent=`${curEnemy.town} conquered! Choose an upgrade for the journey ahead:`;
  document.getElementById('overlay-buttons').innerHTML='';

  let html='<div class="upgrade-grid">';
  chosen.forEach((u,i)=>{
    html+=`<div class="upgrade-card rarity-${u.rarity}" onclick="pickUpgrade(${i})">
      <div class="uc-rarity ${u.rarity}">${u.rarity}</div>
      <div class="uc-icon">${u.icon}</div>
      <div class="uc-name">${u.name}</div>
      <div class="uc-desc">${u.desc}</div>
    </div>`;
  });
  html+='</div>';
  document.getElementById('overlay-extra').innerHTML=html;
  window._upgradeChoices=chosen;
  document.getElementById('overlay').classList.add('show');
}

function pickUpgrade(idx){
  const u=window._upgradeChoices[idx];
  u.apply(H);
  H.upgrades.push(u.name);
  H.upgradeRarities.push(u.rarity);
  document.getElementById('overlay').classList.remove('show');
  level++;
  renderPanel();
  initLevel();
}

function doOverlay(){
  document.getElementById('overlay').classList.remove('show');
  if(overlayNextAction==='fullRestart')initFullGame();
}

/* ===== START ===== */
initFullGame();
</script>
</body>
</html>
