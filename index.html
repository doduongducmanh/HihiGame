<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Battle Arena – Dark Tower</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600;700;800&display=swap");
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Inter", sans-serif;
        background: #0a0a1a;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        color: #e0e0e0;
        overflow-x: hidden;
        padding: 12px 0;
      }
      #game-wrapper {
        display: flex;
        gap: 12px;
        max-width: 1200px;
        width: 97vw;
        align-items: flex-start;
      }

      /* === PANELS === */
      .side-panel {
        width: 210px;
        min-width: 170px;
        border-radius: 16px;
        padding: 16px 12px;
        position: sticky;
        top: 12px;
        flex-shrink: 0;
        font-size: 11px;
      }
      .panel-hero {
        background: linear-gradient(160deg, #1a1a2e, #0f1a30);
        border: 1px solid rgba(79, 172, 254, 0.15);
        box-shadow: 0 0 25px rgba(79, 172, 254, 0.06);
      }
      .panel-enemy {
        background: linear-gradient(160deg, #2e1a1a, #300f0f);
        border: 1px solid rgba(245, 87, 108, 0.15);
        box-shadow: 0 0 25px rgba(245, 87, 108, 0.06);
      }
      .sp-header {
        font-family: "Press Start 2P", monospace;
        font-size: 8px;
        text-align: center;
        margin-bottom: 10px;
        letter-spacing: 1px;
      }
      .panel-hero .sp-header {
        color: #4facfe;
      }
      .panel-enemy .sp-header {
        color: #f5576c;
      }
      .sp-sprite {
        text-align: center;
        font-size: 40px;
        margin-bottom: 6px;
      }
      .sp-sprite span {
        display: inline-block;
        filter: drop-shadow(0 0 10px rgba(79, 172, 254, 0.3));
        animation: idleBob 3s ease-in-out infinite;
      }
      .panel-enemy .sp-sprite span {
        filter: drop-shadow(0 0 10px rgba(245, 87, 108, 0.3));
      }
      @keyframes idleBob {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-4px);
        }
      }
      .sp-name {
        text-align: center;
        font-weight: 700;
        font-size: 13px;
        margin-bottom: 1px;
      }
      .panel-hero .sp-name {
        color: #4facfe;
      }
      .panel-enemy .sp-name {
        color: #f5576c;
      }
      .sp-title {
        text-align: center;
        font-size: 9px;
        color: #777;
        margin-bottom: 8px;
      }
      .sp-divider {
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.1),
          transparent
        );
        margin: 8px 0;
      }
      .sp-stat {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 3px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.03);
      }
      .sp-stat:last-child {
        border-bottom: none;
      }
      .sp-stat .si {
        width: 18px;
        flex-shrink: 0;
      }
      .sp-stat .sn {
        color: #888;
        flex: 1;
      }
      .sp-stat .sv {
        font-weight: 700;
        text-align: right;
      }
      .sp-section {
        font-size: 8px;
        color: #555;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin: 8px 0 4px;
        padding-top: 4px;
        border-top: 1px solid rgba(255, 255, 255, 0.05);
      }
      .sp-tag {
        display: inline-block;
        font-size: 7px;
        padding: 2px 5px;
        border-radius: 3px;
        margin: 1px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.07);
      }
      .sp-tag.common {
        border-color: rgba(67, 233, 123, 0.25);
        color: #43e97b;
      }
      .sp-tag.rare {
        border-color: rgba(79, 172, 254, 0.25);
        color: #4facfe;
      }
      .sp-tag.epic {
        border-color: rgba(192, 132, 252, 0.25);
        color: #c084fc;
      }
      .sp-tag.legendary {
        border-color: rgba(255, 210, 0, 0.25);
        color: #ffd200;
      }

      /* XP Bar */
      .xp-section {
        margin-top: 8px;
      }
      .xp-label {
        font-size: 9px;
        display: flex;
        justify-content: space-between;
        margin-bottom: 2px;
        color: #aaa;
      }
      .xp-track {
        height: 10px;
        background: rgba(0, 0, 0, 0.4);
        border-radius: 5px;
        overflow: hidden;
      }
      .xp-fill {
        height: 100%;
        background: linear-gradient(90deg, #f7971e, #ffd200);
        border-radius: 5px;
        transition: width 0.6s;
      }
      .lvl-badge {
        text-align: center;
        font-family: "Press Start 2P", monospace;
        font-size: 10px;
        color: #ffd200;
        margin: 6px 0;
      }

      /* Stat points */
      .stat-alloc {
        margin-top: 6px;
      }
      .sa-title {
        font-size: 9px;
        color: #ffd200;
        font-weight: 700;
        margin-bottom: 4px;
        text-align: center;
      }
      .sa-row {
        display: flex;
        align-items: center;
        gap: 4px;
        margin-bottom: 3px;
      }
      .sa-row .sa-name {
        flex: 1;
        font-size: 10px;
        color: #ccc;
      }
      .sa-row .sa-val {
        font-weight: 700;
        font-size: 11px;
        width: 24px;
        text-align: center;
      }
      .sa-btn {
        width: 20px;
        height: 20px;
        border: none;
        border-radius: 4px;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
      }
      .sa-btn.plus {
        background: rgba(67, 233, 123, 0.2);
        color: #43e97b;
        border: 1px solid rgba(67, 233, 123, 0.3);
      }
      .sa-btn.plus:hover {
        background: rgba(67, 233, 123, 0.35);
      }
      .sa-btn:disabled {
        opacity: 0.2;
        cursor: not-allowed;
      }
      .sp-remaining {
        text-align: center;
        font-size: 9px;
        color: #ffd200;
        margin-top: 4px;
      }

      /* === MAIN GAME === */
      #game-container {
        flex: 1;
        background: linear-gradient(145deg, #1a1a2e, #16213e);
        border-radius: 18px;
        padding: 20px;
        box-shadow: 0 0 35px rgba(100, 100, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.07);
        position: relative;
        overflow: hidden;
      }
      h1 {
        font-family: "Press Start 2P", monospace;
        text-align: center;
        font-size: 13px;
        background: linear-gradient(90deg, #f7971e, #ffd200);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 3px;
      }
      .sub-header {
        text-align: center;
        font-size: 11px;
        color: #aaa;
        margin-bottom: 10px;
      }
      .sub-header span {
        color: #ffd200;
        font-weight: 700;
      }
      .town-name {
        color: #c084fc !important;
        font-weight: 700;
      }

      .level-progress {
        display: flex;
        justify-content: center;
        gap: 3px;
        margin-bottom: 12px;
        flex-wrap: wrap;
      }
      .lp-dot {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 8px;
        font-weight: 700;
        border: 2px solid rgba(255, 255, 255, 0.1);
        color: #444;
        background: rgba(255, 255, 255, 0.02);
        transition: all 0.4s;
      }
      .lp-dot.cleared {
        background: linear-gradient(135deg, #43e97b, #38f9d7);
        color: #1a1a2e;
        border-color: #43e97b;
        box-shadow: 0 0 6px rgba(67, 233, 123, 0.3);
      }
      .lp-dot.current {
        background: linear-gradient(135deg, #ffd200, #f7971e);
        color: #1a1a2e;
        border-color: #ffd200;
        box-shadow: 0 0 12px rgba(255, 210, 0, 0.4);
        animation: dotPulse 2s ease-in-out infinite;
      }
      .lp-dot.skull {
        color: #f5576c;
        border-color: rgba(245, 87, 108, 0.3);
      }
      @keyframes dotPulse {
        0%,
        100% {
          box-shadow: 0 0 6px rgba(255, 210, 0, 0.3);
        }
        50% {
          box-shadow: 0 0 18px rgba(255, 210, 0, 0.5);
        }
      }

      /* Arena */
      .arena {
        display: flex;
        justify-content: space-between;
        align-items: stretch;
        gap: 12px;
        margin-bottom: 12px;
        min-height: 200px;
      }
      .fighter-card {
        flex: 1;
        background: rgba(255, 255, 255, 0.03);
        border-radius: 14px;
        padding: 14px;
        text-align: center;
        border: 1px solid rgba(255, 255, 255, 0.05);
        position: relative;
        overflow: hidden;
      }
      .fighter-card.hero {
        border-top: 3px solid #4facfe;
      }
      .fighter-card.enemy {
        border-top: 3px solid #f5576c;
      }
      .fighter-card.hit {
        animation: shakeHit 0.5s ease;
      }
      @keyframes shakeHit {
        0%,
        100% {
          transform: translateX(0);
        }
        15% {
          transform: translateX(-8px) rotate(-1deg);
        }
        30% {
          transform: translateX(8px) rotate(1deg);
        }
        45% {
          transform: translateX(-5px);
        }
        60% {
          transform: translateX(5px);
        }
        75% {
          transform: translateX(-2px);
        }
      }
      .fighter-card.attacking-melee .fighter-sprite {
        animation: meleeSwing 0.5s ease;
      }
      @keyframes meleeSwing {
        0% {
          transform: scale(1);
        }
        30% {
          transform: scale(1.3) translateX(20px) rotate(10deg);
        }
        100% {
          transform: scale(1);
        }
      }
      .fighter-card.attacking-fire .fighter-sprite {
        animation: fireBlast 0.5s ease;
      }
      @keyframes fireBlast {
        0% {
          filter: brightness(1);
        }
        40% {
          transform: scale(1.3);
          filter: brightness(1.8) hue-rotate(-20deg);
        }
        100% {
          transform: scale(1);
          filter: brightness(1);
        }
      }
      .fighter-card.attacking-ice .fighter-sprite {
        animation: iceShot 0.5s ease;
      }
      @keyframes iceShot {
        0% {
          filter: brightness(1);
        }
        40% {
          transform: scale(1.2);
          filter: brightness(1.5) hue-rotate(180deg);
        }
        100% {
          filter: brightness(1);
        }
      }
      .fighter-card.attacking-heal .fighter-sprite {
        animation: healGlow 0.6s ease;
      }
      @keyframes healGlow {
        0% {
          filter: drop-shadow(0 0 0 transparent);
        }
        50% {
          transform: scale(1.1);
          filter: drop-shadow(0 0 18px rgba(67, 233, 123, 0.8));
        }
        100% {
          filter: drop-shadow(0 0 0 transparent);
        }
      }
      .fighter-card.attacking-enemy .fighter-sprite {
        animation: enemyAtk 0.5s ease;
      }
      @keyframes enemyAtk {
        0% {
          transform: scale(1);
        }
        30% {
          transform: scale(1.25) translateX(-20px);
        }
        100% {
          transform: scale(1);
        }
      }
      .hit-flash,
      .heal-flash {
        position: absolute;
        inset: 0;
        border-radius: 14px;
        pointer-events: none;
        opacity: 0;
        z-index: 10;
      }
      .fighter-card.hit .hit-flash {
        animation: flashB 0.4s;
      }
      @keyframes flashB {
        0% {
          opacity: 0;
        }
        20% {
          opacity: 0.5;
        }
        100% {
          opacity: 0;
        }
      }
      .hit-flash {
        background: radial-gradient(
          circle,
          rgba(245, 87, 108, 0.5),
          transparent 70%
        );
      }
      .fighter-card.healing .heal-flash {
        animation: flashH 0.5s;
      }
      @keyframes flashH {
        0% {
          opacity: 0;
        }
        30% {
          opacity: 0.4;
        }
        100% {
          opacity: 0;
        }
      }
      .heal-flash {
        background: radial-gradient(
          circle,
          rgba(67, 233, 123, 0.5),
          transparent 70%
        );
      }

      .fighter-sprite {
        font-size: 46px;
        margin-bottom: 6px;
        display: inline-block;
        position: relative;
        z-index: 2;
      }
      .fighter-name {
        font-weight: 700;
        font-size: 14px;
        margin-bottom: 2px;
        position: relative;
        z-index: 2;
      }
      .hero .fighter-name {
        color: #4facfe;
      }
      .enemy .fighter-name {
        color: #f5576c;
      }
      .fighter-title {
        font-size: 9px;
        color: #777;
        margin-bottom: 6px;
      }

      /* Status effects display */
      .status-effects {
        display: flex;
        justify-content: center;
        gap: 4px;
        margin-bottom: 6px;
        min-height: 22px;
        flex-wrap: wrap;
      }
      .se-icon {
        font-size: 14px;
        padding: 2px 4px;
        border-radius: 4px;
        position: relative;
        cursor: default;
      }
      .se-icon .se-turns {
        position: absolute;
        top: -4px;
        right: -4px;
        font-size: 7px;
        background: #f5576c;
        color: #fff;
        border-radius: 50%;
        width: 12px;
        height: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
      }
      .se-burn {
        background: rgba(255, 107, 53, 0.15);
        border: 1px solid rgba(255, 107, 53, 0.3);
      }
      .se-poison {
        background: rgba(67, 233, 123, 0.1);
        border: 1px solid rgba(67, 233, 123, 0.3);
      }
      .se-silence {
        background: rgba(192, 132, 252, 0.1);
        border: 1px solid rgba(192, 132, 252, 0.3);
      }
      .se-stun {
        background: rgba(255, 210, 0, 0.1);
        border: 1px solid rgba(255, 210, 0, 0.3);
      }
      .se-bleed {
        background: rgba(220, 20, 60, 0.1);
        border: 1px solid rgba(220, 20, 60, 0.3);
      }

      .stat-bar {
        margin-bottom: 5px;
        text-align: left;
        position: relative;
        z-index: 2;
      }
      .stat-label {
        font-size: 9px;
        font-weight: 600;
        display: flex;
        justify-content: space-between;
        margin-bottom: 1px;
      }
      .bar-track {
        height: 12px;
        background: rgba(0, 0, 0, 0.5);
        border-radius: 6px;
        overflow: hidden;
        box-shadow: inset 0 2px 3px rgba(0, 0, 0, 0.3);
      }
      .bar-fill {
        height: 100%;
        border-radius: 6px;
        transition: width 0.5s;
        position: relative;
      }
      .bar-fill::after {
        content: "";
        position: absolute;
        top: 1px;
        left: 3px;
        right: 3px;
        height: 3px;
        border-radius: 2px;
        background: rgba(255, 255, 255, 0.18);
      }
      .hp-fill {
        background: linear-gradient(90deg, #43e97b, #38f9d7);
      }
      .hp-fill.low {
        background: linear-gradient(90deg, #f5576c, #ff6a88);
        animation: hpP 1s infinite;
      }
      @keyframes hpP {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.7;
        }
      }
      .mp-fill {
        background: linear-gradient(90deg, #4facfe, #00f2fe);
      }

      .vs-badge {
        align-self: center;
        font-family: "Press Start 2P", monospace;
        font-size: 20px;
        color: #ffd200;
        text-shadow: 0 0 20px rgba(255, 210, 0, 0.4);
        flex-shrink: 0;
      }

      /* Actions */
      .actions {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 6px;
        margin-bottom: 10px;
      }
      .action-btn {
        padding: 10px 4px;
        border: none;
        border-radius: 10px;
        font-family: "Inter", sans-serif;
        font-weight: 600;
        font-size: 11px;
        cursor: pointer;
        transition: all 0.2s;
        color: #fff;
        position: relative;
        overflow: hidden;
      }
      .action-btn::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.1),
          transparent
        );
        border-radius: 10px;
      }
      .action-btn:disabled {
        opacity: 0.25;
        cursor: not-allowed;
      }
      .action-btn:not(:disabled):hover {
        transform: translateY(-3px);
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
      }
      .action-btn .mp-cost {
        display: block;
        font-size: 8px;
        opacity: 0.65;
        margin-top: 1px;
      }
      .action-btn .cd-badge {
        position: absolute;
        top: 3px;
        right: 5px;
        font-size: 8px;
        background: rgba(0, 0, 0, 0.6);
        padding: 1px 4px;
        border-radius: 3px;
        font-weight: 700;
        color: #ffd200;
      }
      .btn-attack {
        background: linear-gradient(135deg, #667eea, #764ba2);
      }
      .btn-fireball {
        background: linear-gradient(135deg, #f7971e, #f5576c);
      }
      .btn-ice {
        background: linear-gradient(135deg, #4facfe, #00f2fe);
      }
      .btn-heal {
        background: linear-gradient(135deg, #43e97b, #38f9d7);
        color: #1a1a2e;
      }

      .log-box {
        background: rgba(0, 0, 0, 0.3);
        border-radius: 10px;
        padding: 10px;
        max-height: 115px;
        overflow-y: auto;
        font-size: 11px;
        line-height: 1.6;
        border: 1px solid rgba(255, 255, 255, 0.04);
      }
      .log-box::-webkit-scrollbar {
        width: 3px;
      }
      .log-box::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.12);
        border-radius: 3px;
      }
      .log-entry {
        padding: 1px 0;
        animation: logIn 0.2s;
      }
      @keyframes logIn {
        from {
          opacity: 0;
          transform: translateX(-8px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
      .log-hero {
        color: #4facfe;
      }
      .log-enemy {
        color: #f5576c;
      }
      .log-system {
        color: #ffd200;
        font-weight: 600;
      }
      .log-heal {
        color: #43e97b;
      }
      .log-dot {
        color: #ff8c00;
      }

      /* Overlays */
      .overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.82);
        justify-content: center;
        align-items: center;
        z-index: 100;
        backdrop-filter: blur(6px);
      }
      .overlay.show {
        display: flex;
      }
      .overlay-box {
        background: linear-gradient(145deg, #1a1a2e, #16213e);
        border-radius: 18px;
        padding: 30px;
        text-align: center;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 0 60px rgba(100, 100, 255, 0.15);
        max-width: 520px;
        width: 92%;
        animation: oPop 0.35s;
      }
      @keyframes oPop {
        from {
          opacity: 0;
          transform: scale(0.85);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
      .overlay-box h2 {
        font-family: "Press Start 2P", monospace;
        font-size: 14px;
        margin-bottom: 8px;
      }
      .overlay-box p {
        font-size: 13px;
        color: #aaa;
        margin-bottom: 16px;
        white-space: pre-line;
      }
      .overlay-btn {
        padding: 10px 28px;
        border: none;
        border-radius: 10px;
        font-family: "Inter", sans-serif;
        font-weight: 700;
        font-size: 13px;
        cursor: pointer;
        color: #fff;
        background: linear-gradient(135deg, #667eea, #764ba2);
        transition:
          transform 0.2s,
          box-shadow 0.2s;
        margin: 3px;
      }
      .overlay-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 22px rgba(102, 126, 234, 0.35);
      }
      .overlay-btn.btn-green {
        background: linear-gradient(135deg, #43e97b, #38f9d7);
        color: #1a1a2e;
      }
      .win-text {
        color: #43e97b;
      }
      .lose-text {
        color: #f5576c;
      }

      /* Upgrade cards */
      .upgrade-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin-top: 12px;
      }
      .upgrade-card {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 12px;
        padding: 14px 10px;
        cursor: pointer;
        transition: all 0.3s;
        text-align: center;
      }
      .upgrade-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 30px rgba(100, 100, 255, 0.2);
        border-color: rgba(255, 255, 255, 0.2);
      }
      .upgrade-card.rarity-common {
        border-left: 3px solid #43e97b;
      }
      .upgrade-card.rarity-rare {
        border-left: 3px solid #4facfe;
      }
      .upgrade-card.rarity-epic {
        border-left: 3px solid #c084fc;
      }
      .upgrade-card.rarity-legendary {
        border-left: 3px solid #ffd200;
        animation: lgGlow 2s infinite;
      }
      @keyframes lgGlow {
        0%,
        100% {
          box-shadow: 0 0 5px rgba(255, 210, 0, 0.05);
        }
        50% {
          box-shadow: 0 0 15px rgba(255, 210, 0, 0.2);
        }
      }
      .uc-icon {
        font-size: 28px;
        margin-bottom: 6px;
      }
      .uc-name {
        font-weight: 700;
        font-size: 12px;
        margin-bottom: 3px;
        color: #ffd200;
      }
      .uc-desc {
        font-size: 10px;
        color: #bbb;
        line-height: 1.4;
      }
      .uc-rarity {
        font-size: 8px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 4px;
      }
      .uc-rarity.common {
        color: #43e97b;
      }
      .uc-rarity.rare {
        color: #4facfe;
      }
      .uc-rarity.epic {
        color: #c084fc;
      }
      .uc-rarity.legendary {
        color: #ffd200;
      }

      /* Particles */
      .particle-container {
        position: absolute;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
        z-index: 20;
        border-radius: 14px;
      }
      .particle {
        position: absolute;
        border-radius: 50%;
        pointer-events: none;
        animation: pFly 0.7s ease-out forwards;
      }
      @keyframes pFly {
        0% {
          opacity: 1;
          transform: translate(0, 0) scale(1);
        }
        100% {
          opacity: 0;
          transform: translate(var(--px), var(--py)) scale(0);
        }
      }
      .dmg-popup {
        position: absolute;
        font-weight: 800;
        font-size: 20px;
        pointer-events: none;
        z-index: 50;
        text-shadow: 0 2px 6px rgba(0, 0, 0, 0.5);
      }
      .dmg-popup.dmg-anim {
        animation: dFloat 1.1s ease forwards;
      }
      @keyframes dFloat {
        0% {
          opacity: 1;
          transform: translateY(0) scale(0.5);
        }
        15% {
          transform: translateY(-8px) scale(1.2);
        }
        30% {
          transform: translateY(-16px) scale(1);
        }
        100% {
          opacity: 0;
          transform: translateY(-50px) scale(0.8);
        }
      }
      .screen-shake {
        animation: sShake 0.25s;
      }
      @keyframes sShake {
        0%,
        100% {
          transform: translate(0);
        }
        25% {
          transform: translate(-2px, 1px);
        }
        50% {
          transform: translate(2px, -1px);
        }
        75% {
          transform: translate(-1px, 1px);
        }
      }

      /* Highest floor badge */
      .highest-floor {
        text-align: center;
        font-size: 9px;
        color: #888;
        margin-bottom: 8px;
      }
      .highest-floor span {
        color: #ffd200;
        font-weight: 700;
      }

      @media (max-width: 900px) {
        #game-wrapper {
          flex-direction: column;
        }
        .side-panel {
          width: 100%;
          position: static;
          display: flex;
          flex-wrap: wrap;
          gap: 6px;
          padding: 10px;
        }
        .sp-header {
          width: 100%;
        }
        .sp-sprite {
          display: none;
        }
        .sp-name,
        .sp-title,
        .sp-divider {
          display: none;
        }
        .sp-stat {
          flex: 1;
          min-width: 70px;
          border: 1px solid rgba(255, 255, 255, 0.05);
          border-radius: 6px;
          padding: 4px 6px;
        }
      }
    </style>

            h.bonusDodge += 0.15;
          },
        },
        {
          icon: "🧛",
          name: "Life Steal",
          desc: "Heal 12% of dmg.",
          rarity: "epic",
          apply: (h) => {
            h.lifesteal += 0.12;
          },
        },
        {
          icon: "🛡️",
          name: "Iron Skin",
          desc: "Armor +5.",
          rarity: "rare",
          apply: (h) => {
            h.bonusArmor += 5;
          },
        },
        {
          icon: "🏰",
          name: "Fortress",
          desc: "Armor +10.",
          rarity: "epic",
          apply: (h) => {
            h.bonusArmor += 10;
          },
        },
        {
          icon: "🔴",
          name: "Berserker",
          desc: "+50% dmg at <30% HP.",
          rarity: "epic",
          apply: (h) => {
            h.berserker = true;
          },
        },
        {
          icon: "🌬️",
          name: "Second Wind",
          desc: "Survive fatal blow 1×.",
          rarity: "legendary",
          apply: (h) => {
            h.hasSecondWind = true;
          },
        },
        {
          icon: "🌟",
          name: "Blessing",
          desc: "+30 HP, +20 MP, +3 ATK.",
          rarity: "legendary",
          apply: (h) => {
            h.bonusHp += 30;
            h.bonusMp += 20;
            h.atkBonus += 3;
          },
        },
        {
          icon: "🦇",
          name: "Vampire Lord",
          desc: "Heal 22% of dmg.",
          rarity: "legendary",
          apply: (h) => {
            h.lifesteal += 0.22;
          },
        },
        {
          icon: "⏱️",
          name: "Haste",
          desc: "All cooldowns −1 turn.",
          rarity: "epic",
          apply: (h) => {
            h.cdReduce += 1;
          },
        },
        {
          icon: "🧿",
          name: "Purify Aura",
          desc: "Status effects last 1 less turn.",
          rarity: "epic",
          apply: (h) => {
            h.statusResist += 1;
          },
        },
      ];

      const DEBUFF_INFO = {
        burn: {
          name: "Burn",
          emoji: "🔥",
          dmgMin: 6,
          dmgMax: 12,
          dur: 3,
          cls: "se-burn",
        },
        poison: {
          name: "Poison",
          emoji: "☠️",
          dmgMin: 5,
          dmgMax: 10,
          dur: 3,
          cls: "se-poison",
        },
        silence: { name: "Silence", emoji: "🤐", dur: 2, cls: "se-silence" },
        stun: { name: "Stun", emoji: "⚡", dur: 1, cls: "se-stun" },
        bleed: {
          name: "Bleed",
          emoji: "🩸",
          dmgMin: 5,
          dmgMax: 11,
          dur: 3,
          cls: "se-bleed",
        },
      };

      /* ========== HERO PERSISTENT ========== */
      let P = {
        level: 1,
        xp: 0,
        statPoints: 0,
        str: 3,
        int: 3,
        vit: 3,
        wis: 3,
        agi: 3,
        bonusHp: 0,
        bonusMp: 0,
        atkBonus: 0,
        fireBonus: 0,
        fireCR: 0,
        iceBonus: 0,
        iceCR: 0,
        healBonus: 0,
        healCR: 0,
        mpRegen: 0,
        thorns: 0,
        bonusCrit: 0,
        bonusDodge: 0,
        lifesteal: 0,
        bonusArmor: 0,
        berserker: false,
        hasSecondWind: false,
        cdReduce: 0,
        statusResist: 0,
        upgrades: [],
        upgradeRarities: [],
        highestFloor: 1,
        clearedFloors: new Set(),
      };

      function xpToNext() {
        return 40 + P.level * 25;
      }
      function totalMaxHp() {
        return 55 + P.vit * 5 + P.bonusHp;
      }
      function totalMaxMp() {
        return 25 + P.wis * 4 + P.bonusMp;
      }
      function totalAtk() {
        return Math.floor(P.str * 1.2) + P.atkBonus;
      }
      function totalMagic() {
        return Math.floor(P.int * 1.2);
      }
      function totalCrit() {
        return 0.03 + P.agi * 0.005 + P.bonusCrit;
      }
      function totalDodge() {
        return P.agi * 0.004 + P.bonusDodge;
      }
      function totalArmor() {
        return Math.floor(P.vit * 0.3) + P.bonusArmor;
      }

      function getSkills() {
        const fc = Math.max(1, 15 - P.fireCR),
          ic = Math.max(1, 10 - P.iceCR),
          hc = Math.max(1, 12 - P.healCR);
        const ma = totalMagic();
        const ta = totalAtk();
        return {
          attack: {
            name: "Attack",
            mp: 0,
            min: 3 + ta,
            max: 7 + ta,
            type: "d",
            emoji: "⚔️",
            anim: "melee",
            cd: 0,
            maxCd: 0,
          },
          fireball: {
            name: "Fireball",
            mp: fc,
            min: 10 + ma + P.fireBonus,
            max: 18 + ma + P.fireBonus,
            type: "d",
            emoji: "🔥",
            anim: "fire",
            cd: 0,
            maxCd: Math.max(1, 3 - P.cdReduce),
            debuff: "burn",
            debuffChance: 0.28,
          },
          ice: {
            name: "Ice Shard",
            mp: ic,
            min: 7 + ma + P.iceBonus,
            max: 14 + ma + P.iceBonus,
            type: "d",
            emoji: "❄️",
            anim: "ice",
            cd: 0,
            maxCd: Math.max(1, 2 - P.cdReduce),
            debuff: "stun",
            debuffChance: 0.15,
          },
          heal: {
            name: "Heal",
            mp: hc,
            min: 8 + P.wis + P.healBonus,
            max: 16 + P.wis + P.healBonus,
            type: "h",
            emoji: "💚",
            anim: "heal",
            cd: 0,
            maxCd: Math.max(1, 3 - P.cdReduce),
          },
        };
      }

      /* ========== GAME STATE ========== */
      let floor = 1,
        busy = false,
        hero = {},
        enemy = {},
        curEnemy = {},
        heroCDs = { attack: 0, fireball: 0, ice: 0, heal: 0 },
        enemyCDs = {},
        heroDebuffs = [],
        enemyDebuffs = [],
        secondWindUsed = false,
        turnNum = 0;
      function rand(a, b) {
        return Math.floor(Math.random() * (b - a + 1)) + a;
      }

      /* ========== INIT ========== */
      function startNewRun() {
        floor = 1;
        initFloor();
      }

      function initFloor() {
        curEnemy = ENEMIES[floor - 1];
        hero = {
          hp: totalMaxHp(),
          mp: totalMaxMp(),
          maxHp: totalMaxHp(),
          maxMp: totalMaxMp(),
        };
        enemy = {
          hp: curEnemy.hp,
          mp: curEnemy.mp,
          maxHp: curEnemy.hp,
          maxMp: curEnemy.mp,
        };
        heroCDs = { attack: 0, fireball: 0, ice: 0, heal: 0 };
        enemyCDs = {};
        curEnemy.skills.forEach((_, i) => (enemyCDs[i] = 0));
        heroDebuffs = [];
        enemyDebuffs = [];
        secondWindUsed = false;
        turnNum = 0;
        busy = false;
        document.getElementById("log-box").innerHTML = "";
        document.getElementById("level-num").textContent = floor;
        document.getElementById("town-name").textContent = curEnemy.town;
        document.getElementById("enemy-sprite").textContent = curEnemy.sprite;
        document.getElementById("enemy-name").textContent = curEnemy.name;
        document.getElementById("enemy-title").textContent = curEnemy.title;
        document.getElementById("highest-floor").textContent = P.highestFloor;
        renderLevelProgress();
        renderHeroPanel();
        renderEnemyPanel();
        updateUI();
        addLog(
          `🗼 Floor ${floor} — <b>${curEnemy.name}</b> blocks the way!`,
          "system",
        );
        setButtons(true);
      }

      /* ========== PANELS ========== */
      function renderHeroPanel() {
        const sk = getSkills();
        let h = '<div class="sp-header">⚔ HERO</div>';
        h += `<div class="sp-sprite"><span>🧙‍♂️</span></div>`;
        h += `<div class="sp-name" style="color:#4facfe">Hero</div><div class="sp-title">Wandering Mage</div>`;
        h += `<div class="lvl-badge">LV ${P.level}</div>`;
        h += `<div class="xp-section"><div class="xp-label"><span>EXP</span><span>${P.xp}/${xpToNext()}</span></div><div class="xp-track"><div class="xp-fill" style="width:${Math.min(100, (P.xp / xpToNext()) * 100)}%"></div></div></div>`;
        h += '<div class="sp-divider"></div>';
        const stats = [
          { i: "❤️", n: "Max HP", v: totalMaxHp() },
          { i: "💧", n: "Max MP", v: totalMaxMp() },
          { i: "💪", n: "STR", v: P.str },
          { i: "🧠", n: "INT", v: P.int },
          { i: "🛡️", n: "VIT", v: P.vit },
          { i: "📖", n: "WIS", v: P.wis },
          { i: "🏃", n: "AGI", v: P.agi },
          { i: "⚔️", n: "ATK", v: `${sk.attack.min}–${sk.attack.max}` },
          { i: "🛡️", n: "Armor", v: totalArmor() },
          { i: "💥", n: "Crit", v: Math.round(totalCrit() * 100) + "%" },
          { i: "💨", n: "Dodge", v: Math.round(totalDodge() * 100) + "%" },
        ];
        if (P.thorns) stats.push({ i: "🌹", n: "Thorns", v: P.thorns });
        if (P.lifesteal)
          stats.push({
            i: "🧛",
            n: "Steal",
            v: Math.round(P.lifesteal * 100) + "%",
          });
        if (P.mpRegen)
          stats.push({ i: "🔋", n: "MP/turn", v: "+" + P.mpRegen });
        h += stats
          .map(
            (s) =>
              `<div class="sp-stat"><span class="si">${s.i}</span><span class="sn">${s.n}</span><span class="sv">${s.v}</span></div>`,
          )
          .join("");

        if (P.statPoints > 0) {
          h +=
            '<div class="stat-alloc"><div class="sa-title">✨ ' +
            P.statPoints +
            " Stat Points</div>";
          ["str", "int", "vit", "wis", "agi"].forEach((s) => {
            const labels = {
              str: "💪 STR",
              int: "🧠 INT",
              vit: "🛡️ VIT",
              wis: "📖 WIS",
              agi: "🏃 AGI",
            };
            h += `<div class="sa-row"><span class="sa-name">${labels[s]}</span><span class="sa-val">${P[s]}</span><button class="sa-btn plus" onclick="allocStat('${s}')">+</button></div>`;
          });
          h += "</div>";
        }

        h += '<div class="sp-section">Upgrades</div>';
        if (P.upgrades.length === 0)
          h += '<span style="font-size:9px;color:#444">None yet</span>';
        else
          h += P.upgrades
            .map(
              (u, i) =>
                `<span class="sp-tag ${P.upgradeRarities[i]}">${u}</span>`,
            )
            .join("");
        document.getElementById("hero-panel").innerHTML = h;
      }

      function renderEnemyPanel() {
        const e = curEnemy;
        let h = '<div class="sp-header">👹 ENEMY</div>';
        h += `<div class="sp-sprite"><span>${e.sprite}</span></div>`;
        h += `<div class="sp-name" style="color:#f5576c">${e.name}</div><div class="sp-title">${e.title}</div>`;
        h += '<div class="sp-divider"></div>';
        const stats = [
          { i: "❤️", n: "HP", v: e.hp },
          { i: "💧", n: "MP", v: e.mp },
          { i: "💨", n: "Dodge", v: Math.round(e.dodge * 100) + "%" },
          { i: "🛡️", n: "Block", v: Math.round(e.block * 100) + "%" },
          { i: "⭐", n: "XP Reward", v: e.xp },
        ];
        h += stats
          .map(
            (s) =>
              `<div class="sp-stat"><span class="si">${s.i}</span><span class="sn">${s.n}</span><span class="sv">${s.v}</span></div>`,
          )
          .join("");
        h += '<div class="sp-section">Skills</div>';
        h += e.skills
          .map(
            (s) =>
              `<div class="sp-stat"><span class="si">${s.emoji}</span><span class="sn">${s.name}</span><span class="sv">${s.type === "d" ? s.min + "–" + s.max : s.type === "h" ? "Heal" : "Debuff"}</span></div>`,
          )
          .join("");
        if (e.debuffs.length) {
          h += '<div class="sp-section">Can Inflict</div>';
          h += e.debuffs
            .map(
              (d) =>
                `<span class="sp-tag" style="color:${d === "burn" ? "#ff6b35" : d === "poison" ? "#43e97b" : d === "silence" ? "#c084fc" : d === "stun" ? "#ffd200" : "#dc143c"}">${DEBUFF_INFO[d].emoji} ${DEBUFF_INFO[d].name}</span>`,
            )
            .join(" ");
        }
        document.getElementById("enemy-panel").innerHTML = h;
      }

      function allocStat(s) {
        if (P.statPoints <= 0) return;
        P[s]++;
        P.statPoints--;
        renderHeroPanel();
        updateUI();
        hero.maxHp = totalMaxHp();
        hero.maxMp = totalMaxMp();
        hero.hp = Math.min(hero.hp, hero.maxHp);
        hero.mp = Math.min(hero.mp, hero.maxMp);
        updateUI();
      }

      /* ========== UI ========== */
      function renderLevelProgress() {
        const c = document.getElementById("level-progress");
        c.innerHTML = "";
        for (let i = 1; i <= 10; i++) {
          const d = document.createElement("div");
          let cls = "lp-dot";
          if (P.clearedFloors.has(i)) cls += " cleared";
          if (i === floor) cls += " current";
          d.className = cls;
          d.textContent = i;
          c.appendChild(d);
        }
      }

      function renderStatusEffects(id, debuffs) {
        const c = document.getElementById(id);
        c.innerHTML = debuffs
          .map((d) => {
            const info = DEBUFF_INFO[d.type];
            return `<span class="se-icon ${info.cls}" title="${info.name}: ${d.turns} turns">${info.emoji}<span class="se-turns">${d.turns}</span></span>`;
          })
          .join("");
      }

      function updateUI() {
        const sk = getSkills();
        const set = (pre, obj) => {
          document.getElementById(pre + "-hp-bar").style.width =
            (obj.hp / obj.maxHp) * 100 + "%";
          document.getElementById(pre + "-hp-bar").className =
            "bar-fill hp-fill" + (obj.hp / obj.maxHp < 0.3 ? " low" : "");
          document.getElementById(pre + "-mp-bar").style.width =
            (obj.mp / obj.maxMp) * 100 + "%";
          document.getElementById(pre + "-hp-text").textContent =
            obj.hp + "/" + obj.maxHp;
          document.getElementById(pre + "-mp-text").textContent =
            obj.mp + "/" + obj.maxMp;
        };
        set("hero", hero);
        set("enemy", enemy);
        renderStatusEffects("hero-status", heroDebuffs);
        renderStatusEffects("enemy-status", enemyDebuffs);

        const btns = document.querySelectorAll(".action-btn");
        const keys = ["attack", "fireball", "ice", "heal"];
        const silenced = heroDebuffs.some((d) => d.type === "silence");
        const stunned = heroDebuffs.some((d) => d.type === "stun");
        keys.forEach((k, i) => {
          const s = sk[k];
          btns[i].querySelector(".mp-cost").textContent = s.mp + " MP";
          let cdEl = btns[i].querySelector(".cd-badge");
          if (heroCDs[k] > 0) {
            if (!cdEl) {
              cdEl = document.createElement("span");
              cdEl.className = "cd-badge";
              btns[i].appendChild(cdEl);
            }
            cdEl.textContent = "⏱" + heroCDs[k];
          } else if (cdEl) cdEl.remove();
          const canUse =
            hero.mp >= s.mp &&
            heroCDs[k] <= 0 &&
            !stunned &&
            (k === "attack" || !silenced);
          btns[i].disabled = !canUse;
        });
      }

      function setButtons(on) {
        document
          .querySelectorAll(".action-btn")
          .forEach((b) => (b.style.pointerEvents = on ? "" : "none"));
      }
      function addLog(m, t) {
        const b = document.getElementById("log-box"),
          d = document.createElement("div");
        d.className = "log-entry log-" + (t || "");
        d.innerHTML = m;
        b.appendChild(d);
        b.scrollTop = b.scrollHeight;
      }
      function spawnP(cid, col, n) {
        const c = document.getElementById(cid);
        for (let i = 0; i < n; i++) {
          const p = document.createElement("div");
          p.className = "particle";
          const s = rand(3, 8);
          p.style.cssText = `width:${s}px;height:${s}px;background:${col};left:${rand(20, 80)}%;top:${rand(20, 60)}%;--px:${rand(-40, 40)}px;--py:${rand(-50, -15)}px;animation-delay:${i * 40}ms`;
          c.appendChild(p);
          setTimeout(() => p.remove(), 800);
        }
      }
      function showPopup(el, t, col) {
        const p = document.createElement("div");
        p.className = "dmg-popup dmg-anim";
        p.textContent = t;
        p.style.color = col;
        p.style.left = "50%";
        p.style.top = "18%";
        p.style.transform = "translateX(-50%)";
        el.appendChild(p);
        setTimeout(() => p.remove(), 1200);
      }
      function playAnim(card, type) {
        card.classList.add("attacking-" + type);
        setTimeout(() => card.classList.remove("attacking-" + type), 600);
      }
      function playHit(card) {
        card.classList.add("hit");
        setTimeout(() => card.classList.remove("hit"), 500);
      }
      function playHeal(card) {
        card.classList.add("healing");
        setTimeout(() => card.classList.remove("healing"), 550);
      }

      /* ========== DEBUFFS ========== */
      function applyDebuff(target, type, resist) {
        const info = DEBUFF_INFO[type];
        if (!info) return;
        const dur = Math.max(1, info.dur - (resist || 0));
        const arr = target === "hero" ? heroDebuffs : enemyDebuffs;
        const existing = arr.find((d) => d.type === type);
        if (existing) {
          existing.turns = Math.max(existing.turns, dur);
        } else {
          arr.push({ type, turns: dur });
        }
        const who = target === "hero" ? "Hero" : "curEnemy.name";
        addLog(
          `${info.emoji} ${target === "hero" ? "Hero" : curEnemy.name} is afflicted with <b>${info.name}</b>! (${dur} turns)`,
          "dot",
        );
      }

      function tickDebuffs(target) {
        const arr = target === "hero" ? heroDebuffs : enemyDebuffs;
        const obj = target === "hero" ? hero : enemy;
        const toRemove = [];
        arr.forEach((d, i) => {
          const info = DEBUFF_INFO[d.type];
          if (info.dmgMin) {
            const dmg = rand(info.dmgMin, info.dmgMax);
            obj.hp = Math.max(0, obj.hp - dmg);
            addLog(
              `${info.emoji} ${target === "hero" ? "Hero" : curEnemy.name} takes <b>${dmg}</b> ${info.name} damage!`,
              "dot",
            );
            if (target === "hero")
              spawnP(
                "hero-particles",
                d.type === "burn"
                  ? "#ff6b35"
                  : d.type === "poison"
                    ? "#43e97b"
                    : "#dc143c",
                4,
              );
            else
              spawnP(
                "enemy-particles",
                d.type === "burn" ? "#ff6b35" : "#43e97b",
                4,
              );
          }
          d.turns--;
          if (d.turns <= 0) toRemove.push(i);
        });
        for (let i = toRemove.length - 1; i >= 0; i--)
          arr.splice(toRemove[i], 1);
      }

      /* ========== COMBAT ========== */
      function calcDmg(min, max, isHero, isMagic) {
        let dmg = rand(min, max);
        if (isHero && P.berserker && hero.hp / hero.maxHp < 0.3)
          dmg = Math.round(dmg * 1.5);
        let crit = false;
        const cc = isHero ? totalCrit() : 0.08;
        if (Math.random() < cc) {
          dmg = Math.round(dmg * 1.8);
          crit = true;
        }
        return { dmg, crit };
      }

      function applyDmgToHero(rawDmg) {
        if (Math.random() < totalDodge()) {
          addLog("💨 Hero <b>dodges</b>!", "hero");
          showPopup(document.getElementById("hero-card"), "DODGE!", "#ffd200");
          return 0;
        }
        let dmg = Math.max(1, rawDmg - totalArmor());
        hero.hp = Math.max(0, hero.hp - dmg);
        if (hero.hp <= 0 && P.hasSecondWind && !secondWindUsed) {
          secondWindUsed = true;
          hero.hp = 1;
          addLog("🌬️ <b>Second Wind!</b>", "system");
          spawnP("hero-particles", "#ffd200", 10);
        }
        if (P.thorns && enemy.hp > 0) {
          enemy.hp = Math.max(0, enemy.hp - P.thorns);
          addLog(`🌹 Thorns: <b>${P.thorns}</b>!`, "hero");
          spawnP("enemy-particles", "#f5576c", 4);
        }
        return dmg;
      }

      function applyDmgToEnemy(rawDmg) {
        if (Math.random() < curEnemy.dodge) {
          addLog(`💨 ${curEnemy.name} <b>dodges</b>!`, "enemy");
          showPopup(document.getElementById("enemy-card"), "DODGE!", "#ffd200");
          return 0;
        }
        if (Math.random() < curEnemy.block) {
          const blocked = Math.round(rawDmg * 0.5);
          const dmg = rawDmg - blocked;
          enemy.hp = Math.max(0, enemy.hp - dmg);
          addLog(`🛡️ ${curEnemy.name} <b>blocks</b>! (−${blocked})`, "enemy");
          return dmg;
        }
        enemy.hp = Math.max(0, enemy.hp - rawDmg);
        return rawDmg;
      }

      function playerAction(key) {
        if (busy) return;
        const silenced = heroDebuffs.some((d) => d.type === "silence");
        if (silenced && key !== "attack") {
          addLog("🤐 Hero is <b>silenced</b>! Can only use Attack.", "system");
          return;
        }
        const sk = getSkills()[key];
        if (hero.mp < sk.mp || heroCDs[key] > 0) return;
        busy = true;
        setButtons(false);
        turnNum++;
        hero.mp -= sk.mp;
        if (P.mpRegen) hero.mp = Math.min(hero.maxMp, hero.mp + P.mpRegen);
        if (sk.maxCd) heroCDs[key] = sk.maxCd;
        Object.keys(heroCDs).forEach((k) => {
          if (k !== key && heroCDs[k] > 0) heroCDs[k]--;
        });

        const hc = document.getElementById("hero-card"),
          ec = document.getElementById("enemy-card");
        playAnim(hc, sk.anim);

        if (sk.type === "d") {
          const { dmg, crit } = calcDmg(sk.min, sk.max, true);
          const actual = applyDmgToEnemy(dmg);
          const ct = crit ? ' <b style="color:#ffd200">💥CRIT!</b>' : "";
          if (actual > 0) {
            addLog(
              `${sk.emoji} Hero → <b>${sk.name}</b>: <b>${actual}</b> dmg!${ct}`,
              "hero",
            );
            setTimeout(() => {
              playHit(ec);
              showPopup(ec, crit ? "💥" + actual : "-" + actual, "#f5576c");
              spawnP(
                "enemy-particles",
                sk.anim === "fire"
                  ? "#ff6b35"
                  : sk.anim === "ice"
                    ? "#00f2fe"
                    : "#c084fc",
                crit ? 12 : 7,
              );
              if (crit)
                (document
                  .getElementById("game-container")
                  .classList.add("screen-shake"),
                  setTimeout(
                    () =>
                      document
                        .getElementById("game-container")
                        .classList.remove("screen-shake"),
                    300,
                  ));
            }, 200);
            if (P.lifesteal) {
              const ls = Math.round(actual * P.lifesteal);
              if (ls > 0) {
                hero.hp = Math.min(hero.maxHp, hero.hp + ls);
                addLog(`🧛 Steal: +${ls} HP`, "heal");
              }
            }
            if (
              sk.debuff &&
              Math.random() < (sk.debuffChance || 0.3) &&
              actual > 0
            )
              applyDebuff("enemy", sk.debuff);
          }
        } else if (sk.type === "h") {
          const heal = rand(sk.min, sk.max);
          hero.hp = Math.min(hero.maxHp, hero.hp + heal);
          addLog(`${sk.emoji} Hero heals <b>${heal}</b> HP!`, "heal");
          playHeal(hc);
          showPopup(hc, "+" + heal, "#43e97b");
          spawnP("hero-particles", "#43e97b", 8);
        }

        setTimeout(() => {
          tickDebuffs("hero");
          updateUI();
          if (hero.hp <= 0) {
            endBattle("enemy");
            return;
          }
          if (enemy.hp <= 0) {
            endBattle("hero");
            return;
          }
          setTimeout(() => enemyTurn(), 600);
        }, 500);
      }

      function enemyTurn() {
        const stunned = enemyDebuffs.some((d) => d.type === "stun");
        if (stunned) {
          addLog(`⚡ ${curEnemy.name} is <b>stunned</b>!`, "system");
          tickDebuffs("enemy");
          updateUI();
          if (enemy.hp <= 0) {
            endBattle("hero");
            return;
          }
          busy = false;
          setButtons(true);
          updateUI();
          return;
        }

        const es = curEnemy.skills;
        let avail = [];
        es.forEach((s, i) => {
          if (enemy.mp >= s.mp && enemyCDs[i] <= 0) avail.push(i);
        });
        if (!avail.length) avail = [0];

        let pickIdx;
        const hpR = enemy.hp / enemy.maxHp;
        const healIdxs = avail.filter((i) => es[i].type === "h");
        const debuffIdxs = avail.filter((i) => es[i].type === "debuff");
        const dmgIdxs = avail.filter((i) => es[i].type === "d");

        if (hpR < 0.3 && healIdxs.length && Math.random() < 0.6)
          pickIdx = healIdxs[rand(0, healIdxs.length - 1)];
        else if (
          debuffIdxs.length &&
          Math.random() < 0.3 &&
          heroDebuffs.length < 2
        )
          pickIdx = debuffIdxs[rand(0, debuffIdxs.length - 1)];
        else if (dmgIdxs.length) pickIdx = dmgIdxs[rand(0, dmgIdxs.length - 1)];
        else pickIdx = avail[rand(0, avail.length - 1)];

        const pick = es[pickIdx];
        enemy.mp -= pick.mp;
        if (pick.cd) enemyCDs[pickIdx] = pick.cd;
        Object.keys(enemyCDs).forEach((k) => {
          if (+k !== pickIdx && enemyCDs[k] > 0) enemyCDs[k]--;
        });

        const hc = document.getElementById("hero-card"),
          ec = document.getElementById("enemy-card");
        playAnim(ec, "enemy");

        if (pick.type === "d") {
          const { dmg, crit } = calcDmg(pick.min, pick.max, false);
          const actual = applyDmgToHero(dmg);
          if (actual > 0) {
            const ct = crit ? ' <b style="color:#ffd200">💥CRIT!</b>' : "";
            addLog(
              `${pick.emoji} ${curEnemy.name} → <b>${pick.name}</b>: <b>${actual}</b> dmg!${ct}`,
              "enemy",
            );
            setTimeout(() => {
              playHit(hc);
              showPopup(hc, crit ? "💥" + actual : "-" + actual, "#f5576c");
              spawnP("hero-particles", "#f5576c", crit ? 12 : 7);
              if (crit)
                (document
                  .getElementById("game-container")
                  .classList.add("screen-shake"),
                  setTimeout(
                    () =>
                      document
                        .getElementById("game-container")
                        .classList.remove("screen-shake"),
                    300,
                  ));
            }, 200);
            if (pick.debuff && Math.random() < 0.5)
              applyDebuff("hero", pick.debuff, P.statusResist);
          }
        } else if (pick.type === "h") {
          const heal = rand(pick.min, pick.max);
          enemy.hp = Math.min(enemy.maxHp, enemy.hp + heal);
          addLog(
            `${pick.emoji} ${curEnemy.name} heals <b>${heal}</b>!`,
            "heal",
          );
          playHeal(ec);
          showPopup(ec, "+" + heal, "#43e97b");
          spawnP("enemy-particles", "#43e97b", 6);
        } else if (pick.type === "debuff") {
          addLog(
            `${pick.emoji} ${curEnemy.name} uses <b>${pick.name}</b>!`,
            "enemy",
          );
          if (pick.debuff) applyDebuff("hero", pick.debuff, P.statusResist);
        }

        setTimeout(() => {
          tickDebuffs("enemy");
          updateUI();
          if (hero.hp <= 0) {
            endBattle("enemy");
            return;
          }
          if (enemy.hp <= 0) {
            endBattle("hero");
            return;
          }
          busy = false;
          setButtons(true);
          updateUI();
          /* AUTO-SKIP if hero is stunned after enemy turn */
          if (heroDebuffs.some((d) => d.type === "stun")) {
            setTimeout(() => heroStunSkip(), 800);
          }
        }, 500);
      }

      function heroStunSkip() {
        busy = true;
        setButtons(false);
        addLog(
          "⚡ Hero is <b>stunned</b> and cannot act! Turn skipped.",
          "system",
        );
        showPopup(document.getElementById("hero-card"), "STUNNED!", "#ffd200");
        spawnP("hero-particles", "#ffd200", 6);
        Object.keys(heroCDs).forEach((k) => {
          if (heroCDs[k] > 0) heroCDs[k]--;
        });
        turnNum++;
        setTimeout(() => {
          tickDebuffs("hero");
          updateUI();
          if (hero.hp <= 0) {
            endBattle("enemy");
            return;
          }
          setTimeout(() => enemyTurn(), 600);
        }, 700);
      }

      /* ========== END BATTLE ========== */
      function gainXP(amount) {
        P.xp += amount;
        let leveledUp = false;
        while (P.xp >= xpToNext()) {
          P.xp -= xpToNext();
          P.level++;
          P.statPoints += 3;
          leveledUp = true;
        }
        return leveledUp;
      }

      function endBattle(winner) {
        setButtons(false);
        if (winner === "hero") {
          P.clearedFloors.add(floor);
          if (floor >= P.highestFloor)
            P.highestFloor = floor + 1 > 10 ? 10 : floor + 1;
          const xpGain = curEnemy.xp;
          const leveledUp = gainXP(xpGain);
          addLog(
            `🎉 <b>${curEnemy.name} defeated!</b> +${xpGain} XP${leveledUp ? " 🎊 LEVEL UP!" : ""}`,
            "system",
          );

          if (floor >= 10) {
            setTimeout(() => {
              const ob = document.getElementById("overlay-box");
              document.getElementById("overlay-title").textContent =
                "🏆 TOWER CONQUERED!";
              document.getElementById("overlay-title").className = "win-text";
              document.getElementById("overlay-msg").textContent =
                `You reached the top of the Dark Tower!\nHero Level: ${P.level}\n\nThe realm is saved... for now.`;
              document.getElementById("overlay-extra").innerHTML = "";
              document.getElementById("overlay-buttons").innerHTML =
                '<button class="overlay-btn" onclick="closeOL();startNewRun()">Climb Again</button>';
              document.getElementById("overlay").classList.add("show");
            }, 800);
          } else {
            setTimeout(() => showUpgrades(leveledUp), 800);
          }
        } else {
          const xpGain = Math.round(curEnemy.xp * 0.25);
          const leveledUp = gainXP(xpGain);
          addLog(
            `💀 Defeated... +${xpGain} XP (partial)${leveledUp ? " 🎊 LEVEL UP!" : ""}`,
            "system",
          );
          setTimeout(() => {
            document.getElementById("overlay-title").textContent =
              "💀 DEFEATED";
            document.getElementById("overlay-title").className = "lose-text";
            document.getElementById("overlay-msg").textContent =
              `Fell at Floor ${floor} — ${curEnemy.town}.\n+${xpGain} XP earned.${leveledUp ? "\n🎊 Level Up! You are now LV " + P.level + "!" : ""}\n\nGrow stronger and try again!`;
            document.getElementById("overlay-extra").innerHTML = "";
            let btns =
              '<button class="overlay-btn btn-green" onclick="closeOL();startNewRun()">🔄 Try Again (Floor 1)</button>';
            if (P.clearedFloors.size > 0) {
              const highest = Math.max(...P.clearedFloors);
              if (highest > 1)
                btns += `<button class="overlay-btn" onclick="closeOL();floor=${Math.min(highest, floor)};initFloor()">⚔️ Retry Floor ${Math.min(highest, floor)}</button>`;
            }
            document.getElementById("overlay-buttons").innerHTML = btns;
            document.getElementById("overlay").classList.add("show");
            renderHeroPanel();
          }, 800);
        }
      }

      function showUpgrades(leveledUp) {
        let filtered = [...UPGRADES];
        if (floor <= 3)
          filtered = filtered.filter((u) => u.rarity !== "legendary");
        if (floor <= 1) filtered = filtered.filter((u) => u.rarity !== "epic");
        const chosen = [];
        const used = new Set();
        while (chosen.length < 3 && filtered.length > used.size) {
          const i = rand(0, filtered.length - 1);
          if (!used.has(i)) {
            used.add(i);
            chosen.push(filtered[i]);
          }
        }

        document.getElementById("overlay-title").textContent =
          "⬆️ FLOOR CLEARED!";
        document.getElementById("overlay-title").className = "win-text";
        let msg = `${curEnemy.town} conquered!`;
        if (leveledUp)
          msg += `\n🎊 Level Up! You are now LV ${P.level}! (+3 stat points)`;
        msg += "\nChoose an upgrade:";
        document.getElementById("overlay-msg").textContent = msg;
        document.getElementById("overlay-buttons").innerHTML = "";

        let html = '<div class="upgrade-grid">';
        chosen.forEach((u, i) => {
          html += `<div class="upgrade-card rarity-${u.rarity}" onclick="pickUpgrade(${i})"><div class="uc-rarity ${u.rarity}">${u.rarity}</div><div class="uc-icon">${u.icon}</div><div class="uc-name">${u.name}</div><div class="uc-desc">${u.desc}</div></div>`;
        });
        html += "</div>";
        document.getElementById("overlay-extra").innerHTML = html;
        window._uc = chosen;
        document.getElementById("overlay").classList.add("show");
      }

      function pickUpgrade(i) {
        const u = window._uc[i];
        u.apply(P);
        P.upgrades.push(u.name);
        P.upgradeRarities.push(u.rarity);
        closeOL();
        floor++;
        renderHeroPanel();
        initFloor();
      }

      function closeOL() {
        document.getElementById("overlay").classList.remove("show");
      }

      /* ========== START ========== */
      startNewRun();
    </script>
  </body>
</html>
